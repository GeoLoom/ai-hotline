name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Aligner npm sur la version locale du projet
        run: npm install -g npm@11.6.1

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Linting
        run: npx eslint src/ --ext .ts || true

      - name: Couverture de tests
        run: npm run test:coverage

      - name: Audit de sécurité des dépendances
        run: npm audit --audit-level=high
